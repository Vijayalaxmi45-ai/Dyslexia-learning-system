{% extends "base.html" %}

{% block title %}{{ t.register }} - {{ t.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center py-5">
        <div class="col-md-5">
            <div class="glass-card p-5 mt-4 fade-in">
                <div class="text-center mb-5">
                    <div class="display-3 mb-3">📝</div>
                    <h1 class="fw-bold mb-0 display-6">{{ t.register }}</h1>
                    <p class="text-secondary opacity-75 mt-2">Join our community and start your journey.</p>
                </div>

                <div class="mb-4">
                    <a href="{{ url_for('google_login') }}" class="btn btn-outline-dark w-100 rounded-4 p-3 d-flex align-items-center justify-content-center gap-2 border-opacity-25" style="border: 1px solid #ddd;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
                        Continue with Google
                    </a>
                </div>

                <div class="position-relative text-center mb-4">
                    <hr class="opacity-10">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-secondary">OR</span>
                </div>

                <form action="{{ url_for('register') }}" method="POST">
                    <div class="mb-4">
                        <label for="username"
                            class="form-label fw-bold small text-uppercase tracking-wider opacity-75">Username</label>
                        <input type="text" class="form-control form-control-lg rounded-4 p-3 bg-light border-0"
                            id="username" name="username" placeholder="johndoe" required>
                    </div>
                    <div class="mb-4">
                        <label for="email"
                            class="form-label fw-bold small text-uppercase tracking-wider opacity-75">Email
                            Address</label>
                        <input type="email" class="form-control form-control-lg rounded-4 p-3 bg-light border-0"
                            id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-5">
                        <label for="password"
                            class="form-label fw-bold small text-uppercase tracking-wider opacity-75">Password</label>
                        <input type="password" class="form-control form-control-lg rounded-4 p-3 bg-light border-0"
                            id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-premium btn-lg w-100 py-3 shadow-lg mb-4">
                        {{ t.register }}
                    </button>
                </form>

                <p class="text-center mb-0 mt-4">
                    Already have an account? <a href="{{ url_for('login') }}"
                        class="text-primary fw-bold text-decoration-none">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    .tracking-wider {
        letter-spacing: 0.1em;
    }

    .form-control:focus {
        background: white !important;
        box-shadow: 0 0.5rem 1.5rem rgba(99, 102, 241, 0.1);
    }

    .dark-theme .form-control {
        background: #1e293b !important;
        color: white;
    }

    .dark-theme .form-control:focus {
        background: #334155 !important;
    }
</style>
{% endblock %}
